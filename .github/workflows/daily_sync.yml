name: Daily IPSet Sync

on:
  schedule:
    # 每天台灣時間凌晨 04:00 執行 (UTC 20:00)
    - cron: '0 20 * * *'
  workflow_dispatch: # 允許手動點擊按鈕執行

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download and Merge files
        run: |
          # 1. 下載原始檔案 (使用暫存檔名)
          echo "Downloading remote files..."
          curl -sSL "https://raw.githubusercontent.com/dragoinformatica/dpt-blocklists/refs/heads/main/iplist.ipset" -o iplist.ipset
          curl -sSL "https://raw.githubusercontent.com/bol-van/rulist/refs/heads/main/reestr_hostname.txt" -o reestr_hostname.txt.remote

          # 2. 處理 reestr_hostname.txt 的合併
          if [ -f "edit.txt" ]; then
            echo "Found edit.txt, merging now..."
            
            # 確保 edit.txt 最後一行有換行符號，避免合併時首尾相黏
            sed -i '$a\' edit.txt
            
            # 將遠端檔案與本地 edit.txt 合併
            cat reestr_hostname.txt.remote edit.txt > reestr_hostname.txt.merged
            
            # 3. 自動去重並排序 (確保清單乾淨且不重複)
            sort -u reestr_hostname.txt.merged > reestr_hostname.txt
            
            # 清理暫存檔案
            rm reestr_hostname.txt.remote reestr_hostname.txt.merged
            echo "Merge and Sort complete!"
          else
            echo "Warning: edit.txt not found in root! Using remote version only."
            mv reestr_hostname.txt.remote reestr_hostname.txt
          fi

      - name: Commit and Push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 將變動加入索引
          git add iplist.ipset reestr_hostname.txt
          
          # 檢查是否有變動
          if git diff --staged --quiet; then
            echo "No changes detected in either file."
          else
            git commit -m "Automated update & merge: $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          fi
