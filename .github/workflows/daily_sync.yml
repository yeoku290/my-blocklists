name: Daily IPSet Sync

on:
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download and Merge files
        run: |
          # 1. 下載原始檔案
          curl -sSL "https://raw.githubusercontent.com/dragoinformatica/dpt-blocklists/refs/heads/main/iplist.ipset" -o iplist.ipset
          curl -sSL "https://raw.githubusercontent.com/bol-van/rulist/refs/heads/main/reestr_hostname.txt" -o reestr_hostname.txt.remote

          # 2. 合併邏輯
          if [ -f "edit.txt" ]; then
            echo "--- 偵測到 edit.txt，開始強制合併 ---"
            
            # 先建立一個乾淨的新檔案，第一行放更新時間 (當作標記)
            echo "# Last Updated: $(date +'%Y-%m-%d %H:%M:%S')" > reestr_hostname.txt
            
            # 接著放入遠端原始內容
            cat reestr_hostname.txt.remote >> reestr_hostname.txt
            
            # 最後放入你的 edit.txt 內容
            echo "" >> reestr_hostname.txt
            echo "# --- MY CUSTOM LIST START ---" >> reestr_hostname.txt
            cat edit.txt >> reestr_hostname.txt
            
            echo "--- 合併完成 ---"
          else
            mv reestr_hostname.txt.remote reestr_hostname.txt
          fi

      - name: Commit and Push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add iplist.ipset reestr_hostname.txt
          
          # 強制提交，即便只有時間標記改變也會更新
          git commit -m "Force sync with timestamp: $(date +'%Y-%m-%d %H:%M:%S')"
          git push
