name: Daily IPSet Sync

on:
  schedule:
    # 每天台灣時間凌晨 04:00 執行 (UTC 20:00)
    - cron: '0 20 * * *'
  workflow_dispatch: # 允許手動點擊按鈕執行

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 確保抓取所有檔案紀錄

      - name: Download and Merge files
        run: |
          # 1. 下載原始檔案
          curl -sSL "https://raw.githubusercontent.com/dragoinformatica/dpt-blocklists/refs/heads/main/iplist.ipset" -o iplist.ipset
          curl -sSL "https://raw.githubusercontent.com/bol-van/rulist/refs/heads/main/reestr_hostname.txt" -o reestr_hostname.txt.remote

          # 2. 合併邏輯 (拿掉排序，改為強制附加在最後)
          if [ -f "edit.txt" ]; then
            echo "--- 偵測到 edit.txt，開始合併 ---"
            # 複製一份原始檔作為基礎
            cp reestr_hostname.txt.remote reestr_hostname.txt
            # 確保檔案末尾有換行
            sed -i '$a\' reestr_hostname.txt
            # 把 edit.txt 內容直接接在後面
            cat edit.txt >> reestr_hostname.txt
            echo "--- 合併完成 ---"
          else
            echo "!!! 錯誤：找不到 edit.txt !!!"
            mv reestr_hostname.txt.remote reestr_hostname.txt
          fi

      - name: Commit and Push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add iplist.ipset reestr_hostname.txt
          
          if git diff --staged --quiet; then
            echo "No changes detected."
          else
            git commit -m "Manual sync and merge edit.txt: $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          fi
