name: Daily IPSet Sync

on:
  schedule:
    # 每天台灣時間凌晨 04:00 執行 (UTC 20:00)
    - cron: '0 20 * * *'
  workflow_dispatch: # 允許手動點擊按鈕執行

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download the latest iplist
        run: |
          curl -sSL "https://raw.githubusercontent.com/dragoinformatica/dpt-blocklists/refs/heads/main/iplist.ipset" -o iplist.ipset

      - name: Commit and Push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add iplist.ipset
          # 檢查是否有變動，避免無意義的提交
          if git diff --staged --quiet; then
            echo "No changes detected."
          else
            git commit -m "Automated update: $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          fi
